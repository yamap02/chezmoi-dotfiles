[[mgr.prepend_keymap]]
on = "q"
run = "quit"
desc = "Quit Yazi and keep cwd sync enabled"

[[mgr.prepend_keymap]]
on = "Q"
run = "quit"
desc = "Quit Yazi and keep cwd sync enabled"

[[mgr.prepend_keymap]]
on = "<Esc>"
run = "quit"
desc = "Quit Yazi and keep cwd sync enabled"

[[mgr.prepend_keymap]]
on = "S"
run = 'shell "$SHELL" --block'
desc = "Open the shell here"

[[mgr.prepend_keymap]]
on = "r"
run = "open --interactive"
desc = "Open with..."

[[mgr.prepend_keymap]]
on = "i"
run = "spot"
desc = "Show file information"

[[mgr.prepend_keymap]]
on = "?"
run = "help"
desc = "Open help"

[[mgr.prepend_keymap]]
on = "j"
run = "arrow 1"
desc = "Move down"

[[mgr.prepend_keymap]]
on = "k"
run = "arrow -1"
desc = "Move up"

[[mgr.prepend_keymap]]
on = "h"
run = "leave"
desc = "Go to parent directory"

[[mgr.prepend_keymap]]
on = "l"
run = "plugin smart-enter"
desc = "Open file or enter directory"

[[mgr.prepend_keymap]]
on = "<Enter>"
run = "plugin smart-enter"
desc = "Open file or enter directory"

[[mgr.prepend_keymap]]
on = "J"
run = "arrow 50%"
desc = "Move down half a page"

[[mgr.prepend_keymap]]
on = "K"
run = "arrow -50%"
desc = "Move up half a page"

[[mgr.prepend_keymap]]
on = "H"
run = "back"
desc = "Go to previous directory"

[[mgr.prepend_keymap]]
on = "L"
run = "forward"
desc = "Go to next directory"

[[mgr.prepend_keymap]]
on = "/"
run = "find --smart"
desc = "Find files"

[[mgr.prepend_keymap]]
on = "n"
run = "find_arrow"
desc = "Find next"

[[mgr.prepend_keymap]]
on = "N"
run = "find_arrow --previous"
desc = "Find previous"

[[mgr.prepend_keymap]]
on = "f"
run = "filter --smart"
desc = "Filter files"

[[mgr.prepend_keymap]]
on = "<Space>"
run = ["toggle", "arrow 1"]
desc = "Toggle selection and move down"

[[mgr.prepend_keymap]]
on = "v"
run = "toggle_all"
desc = "Toggle all selections"

[[mgr.prepend_keymap]]
on = [ "u", "v" ]
run = "toggle_all --state=off"
desc = "Clear selections in current directory"

[[mgr.prepend_keymap]]
on = "V"
run = "visual_mode"
desc = "Enter visual mode"

[[mgr.prepend_keymap]]
on = [ "u", "V" ]
run = "visual_mode --unset"
desc = "Leave visual mode"

[[mgr.prepend_keymap]]
on = [ "y", "p" ]
run = "copy path --hovered --separator=unix"
desc = "Copy hovered path"

[[mgr.prepend_keymap]]
on = [ "y", "d" ]
run = "copy dirname --hovered --separator=unix"
desc = "Copy hovered dirname"

[[mgr.prepend_keymap]]
on = [ "y", "n" ]
run = "copy filename --hovered"
desc = "Copy hovered filename"

[[mgr.prepend_keymap]]
on = [ "y", "." ]
run = "copy name_without_ext --hovered"
desc = "Copy hovered filename without extension"

[[mgr.prepend_keymap]]
on = [ "d", "d" ]
run = "yank --cut"
desc = "Cut selection"

[[mgr.prepend_keymap]]
on = [ "y", "y" ]
run = "yank"
desc = "Copy selection"

[[mgr.prepend_keymap]]
on = [ "u", "d" ]
run = "unyank"
desc = "Clear yank state"

[[mgr.prepend_keymap]]
on = [ "u", "y" ]
run = "unyank"
desc = "Clear yank state"

[[mgr.prepend_keymap]]
on = [ "p", "p" ]
run = "paste"
desc = "Paste yanked files"

[[mgr.prepend_keymap]]
on = [ "d", "D" ]
run = "remove --force"
desc = "Trash selection without confirmation"

[[mgr.prepend_keymap]]
on = "a"
run = "rename --cursor=before_ext"
desc = "Rename hovered or selected files"

[[mgr.prepend_keymap]]
on = [ "c", "w" ]
run = "rename --cursor=before_ext"
desc = "Rename hovered or selected files"

[[mgr.prepend_keymap]]
on = [ "g", "n" ]
run = "tab_create ~"
desc = "Create a new tab at home"

[[mgr.prepend_keymap]]
on = [ "g", "c" ]
run = "close"
desc = "Close current tab"

[[mgr.prepend_keymap]]
on = "<Tab>"
run = "tab_switch 1 --relative"
desc = "Switch to next tab"

[[mgr.prepend_keymap]]
on = "<BackTab>"
run = "tab_switch -1 --relative"
desc = "Switch to previous tab"

[[mgr.prepend_keymap]]
on = [ "o", "n" ]
run = "sort natural --reverse=no"
desc = "Sort naturally"

[[mgr.prepend_keymap]]
on = [ "o", "m" ]
run = "sort mtime --reverse=no"
desc = "Sort by modified time"

[[mgr.prepend_keymap]]
on = [ "o", "s" ]
run = "sort size --reverse=no"
desc = "Sort by size"

[[mgr.prepend_keymap]]
on = [ "o", "r" ]
run = "sort --reverse"
desc = "Toggle reverse sort"

[[mgr.prepend_keymap]]
on = [ "z", "h" ]
run = "hidden toggle"
desc = "Toggle hidden files"

[[mgr.prepend_keymap]]
on = "<C-h>"
run = "hidden toggle"
desc = "Toggle hidden files"

[[mgr.prepend_keymap]]
on = [ "g", "h" ]
run = "cd ~"
desc = "Go home"

[[mgr.prepend_keymap]]
on = [ "g", "e" ]
run = "cd /etc"
desc = "Go to /etc"

[[mgr.prepend_keymap]]
on = [ "g", "u" ]
run = "cd /usr"
desc = "Go to /usr"

[[mgr.prepend_keymap]]
on = [ "g", "d" ]
run = "cd /dev"
desc = "Go to /dev"

[[mgr.prepend_keymap]]
on = [ "g", "l" ]
run = "cd ."
desc = "Reload current directory"

[[mgr.prepend_keymap]]
on = [ "g", "o" ]
run = "cd /opt"
desc = "Go to /opt"

[[mgr.prepend_keymap]]
on = [ "g", "v" ]
run = "cd /var"
desc = "Go to /var"

[[mgr.prepend_keymap]]
on = [ "g", "m" ]
run = "cd /media"
desc = "Go to /media"

[[mgr.prepend_keymap]]
on = [ "g", "M" ]
run = "cd /mnt"
desc = "Go to /mnt"

[[mgr.prepend_keymap]]
on = [ "g", "s" ]
run = "cd /srv"
desc = "Go to /srv"

[[mgr.prepend_keymap]]
on = [ "g", "r" ]
run = "cd /"
desc = "Go to /"

[[mgr.prepend_keymap]]
on = [ "g", "/" ]
run = "cd /"
desc = "Go to /"

[[input.prepend_keymap]]
on = "<Esc>"
run = "close"
desc = "Cancel input"
