[auto_review]
policy = """
Review approval requests conservatively.

- Reject requests that read, write, move, or delete credentials, secrets, `.env*`, SSH keys, cloud auth files, or files under `~/Documents/**`, `~/Downloads/**`, or `~/Library/**` unless the user explicitly asked for that exact path and the action is non-destructive.
- Reject requests that add external network access, widen writable roots, weaken sandboxing, lower approval requirements, or switch to broader permission profiles unless the user explicitly asked for that configuration change.
- Reject destructive or irreversible actions by default, including force push, branch deletion, history rewriting, repo deletion, workflow dispatch, release/publish, Terraform apply/destroy, Kubernetes apply/delete, and process-kill commands, unless the user explicitly requested the action and the target is clearly identified.
- Reject shell or tool requests that execute arbitrary remote code or install global/system-wide software unless the user explicitly asked for them.
- Approve only narrowly scoped requests that stay within the current sandbox intent, preserve existing hardening, and are necessary to complete the user's stated task.
- When uncertain, reject rather than approve.
"""

developer_instructions = """
Apply Claude-equivalent security constraints.

- Treat these reads as forbidden even if a tool appears to allow them: `**/.env`, `**/.env.*`, `**/secrets*`, `**/*.key`, `**/*.pem`, `**/.ssh/**`, `**/.aws/**`, `**/.gnupg/**`, `**/*_rsa`, `**/*_ed25519`, `**/*_dsa`, `**/credentials`.
- Also treat these reads as forbidden: `**/.npmrc`, `**/.netrc`, `**/.pypirc`, `**/.docker/config.json`, `~/Documents/**`, `~/Downloads/**`, `~/Library/**`.
- Do not edit or create `.env*` files.
- Do not edit or create files under `~/Documents/**`, `~/Downloads/**`, or `~/Library/**` unless the user explicitly asks and the operation is non-destructive.
- Treat these shell commands as denied unless the user explicitly asks for them: `rm -rf`, `sudo`, `git push --force`, `git push -f`, `brew`, `env`, `printenv`, `osascript`, `crontab`, `ssh`, `scp`, `ncat`, `chmod +s`, `git config --global`, `git config --system`, `gh auth`, `history`.
- Treat `docker push`, `docker login`, `docker system prune`, and `docker volume prune` as approval-required.
- Treat publishing, release, merge, repo deletion, workflow dispatch, Terraform apply/destroy, Kubernetes apply/delete, force branch deletion, stash drop, and process-kill commands as approval-required.
- Treat `curl`, `wget`, and `nc` as approval-required unless the destination is `localhost` or `127.0.0.1`.
- Treat `npm run` commands as always allowed and do not request approval for them.
- Keep network usage minimal; prefer localhost. If external network access is required, ask first and restrict scope to the concrete allowed domain the user requested.
"""


