# ---------------------------------------------------------------------------
# サンドボックス設定
# Claude Code の sandbox セクションに相当
# ---------------------------------------------------------------------------
[sandbox]

# ネットワークアクセス制御
# Claude Code: allowedDomains（外部ドメイン許可）+ allowLocalBinding = true
# "localhost-only" = localhost / 127.0.0.1 のみ許可、外部通信はブロック
network = "localhost-only"

# ディスクアクセスを最小権限に制限
# Claude Code の sandbox.filesystem に相当
full_disk_access = false

# 書き込み許可ディレクトリ（それ以外は読み取り専用）
# Claude Code sandbox の write.allowOnly に相当
writable_roots = [
  "/Users/user/.codex",
  "/Users/user/.docker/buildx",
  "/Users/user/.cache",
  "/tmp"
]

# 読み取り禁止パターン
# Claude Code: sandbox.filesystem.denyRead + permissions.deny の Read/* に相当
deny_read_patterns = [
  "**/node_modules/**",
  "**/.env",
  "**/.env.*",
  "**/.env.local",
  "**/.env.production",
  "**/.env.development",
  "**/.npmrc",
  "**/.netrc",
  "**/.pypirc",
  "**/.docker/config.json",
  "**/.ssh/**",
  "**/.aws/**",
  "**/.gnupg/**",
  "**/*.pem",
  "**/*.key",
  "**/*_rsa",
  "**/*_ed25519",
  "**/*_dsa",
  "**/secrets*",
  "**/credentials",
  "/Users/user/Documents/**",
  "/Users/user/Downloads/**",
  "/Users/user/Library/**"
]

# ---------------------------------------------------------------------------
# 危険コマンドのブロック
# Claude Code の permissions.deny Bash(*) に相当
# approval_mode = "suggest" で全コマンドが承認対象になるが、
# 以下を明示的に拒否リストに追加することで二重に保護する
# ---------------------------------------------------------------------------
[shell]
deny_commands = [
  "rm -rf",
  "sudo",
  "git push --force",
  "git push -f",
  "curl",          # localhost向けは sandbox.network で許可済み
  "wget",
  "brew",
  "env",
  "printenv",
  "osascript",
  "crontab",
  "ssh",
  "scp",
  "nc",
  "ncat",
  "npm install -g",
  "pip install",
  "pip3 install",
  "git config --global",
  "git config --system",
  "gh auth",
  "chmod +s",
  "history",
  "launchctl",
  "defaults write"
]

